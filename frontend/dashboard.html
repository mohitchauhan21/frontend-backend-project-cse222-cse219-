<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MedRemind Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#58cc02', 'primary-dark': '#46a302', secondary: '#1cb0f6', danger: '#ff4b4b', warning: '#ffc800' },
                    fontFamily: { display: ['Varela Round', 'sans-serif'], sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 font-sans">
    <div id="dashboard-app" class="animate-slide-up">
        <!-- Content will be dynamically injected by dashboard.js based on role -->
        <div class="flex items-center justify-center min-h-[60vh]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/scheduler.js"></script>
</body>
</html>
