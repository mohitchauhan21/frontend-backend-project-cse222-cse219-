<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MedRemind</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .elderly-text { font-size: 1.1rem; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#10b981',
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">
    <div id="dashboard-content" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Dashboard logic will inject content here -->
        <div class="flex items-center justify-center h-64">
            <p class="text-slate-400 animate-pulse">Loading MedRemind...</p>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 md:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-primary">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </a>
        <a href="medicines.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="pill" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Meds</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">History</span>
        </a>
        <button id="logout-btn" class="flex flex-col items-center text-slate-400">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Exit</span>
        </button>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
