<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Medicines - MedRemind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', secondary: '#10b981' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20 font-['Inter']">
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-display font-bold">My Medicines</h1>
            <button id="add-medicine-btn" class="bg-primary text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-sky-100 flex items-center gap-2">
                <i data-lucide="plus"></i> Add New
            </button>
        </header>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div id="medicine-list" class="divide-y divide-slate-50">
                <div class="p-8 text-center text-slate-400">Loading medicines...</div>
            </div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 md:hidden z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Home</span>
        </a>
        <a href="medicines.html" class="flex flex-col items-center text-primary">
            <i data-lucide="pill" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Meds</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">History</span>
        </a>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/medicines.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
