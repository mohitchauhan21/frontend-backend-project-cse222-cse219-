<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MedRemind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#58cc02', 'primary-dark': '#46a302', secondary: '#1cb0f6', danger: '#ff4b4b', warning: '#ffc800' },
                    fontFamily: { display: ['Varela Round', 'sans-serif'], sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 font-sans">
    <div class="max-w-6xl mx-auto p-4 md:p-8 animate-slide-up">
        
        <!-- Tab Navigation -->
        <div class="flex flex-wrap gap-2 mb-8 bg-white dark:bg-slate-800 p-2 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 w-fit">
            <button onclick="switchAdminTab('overview')" id="tab-btn-overview" class="admin-tab active px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2 bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-white">
                <i data-lucide="pie-chart" class="w-4 h-4"></i> Overview
            </button>
            <button onclick="switchAdminTab('users')" id="tab-btn-users" class="admin-tab px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">
                <i data-lucide="users" class="w-4 h-4"></i> Users
            </button>
            <button onclick="switchAdminTab('doctors')" id="tab-btn-doctors" class="admin-tab px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">
                <i data-lucide="stethoscope" class="w-4 h-4"></i> Doctors
            </button>
            <button onclick="switchAdminTab('analytics')" id="tab-btn-analytics" class="admin-tab px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">
                <i data-lucide="bar-chart" class="w-4 h-4"></i> Analytics
            </button>
        </div>

        <!-- OVERVIEW SECTION -->
        <div id="section-overview" class="admin-section block">
            <h1 class="text-4xl font-display font-black text-slate-800 dark:text-white mb-8">System Overview</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Stats Cards populated by JS -->
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="w-12 h-12 bg-primary/10 text-primary rounded-xl flex items-center justify-center mb-4"><i data-lucide="users"></i></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Total Users</p>
                    <h3 id="stat-total-users" class="text-3xl font-black font-display mt-1">--</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="w-12 h-12 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center mb-4"><i data-lucide="user"></i></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Patients</p>
                    <h3 id="stat-patients" class="text-3xl font-black font-display mt-1">--</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="w-12 h-12 bg-sky-500/10 text-sky-500 rounded-xl flex items-center justify-center mb-4"><i data-lucide="stethoscope"></i></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Doctors</p>
                    <h3 id="stat-doctors" class="text-3xl font-black font-display mt-1">--</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="w-12 h-12 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center mb-4"><i data-lucide="heart"></i></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Caregivers</p>
                    <h3 id="stat-caregivers" class="text-3xl font-black font-display mt-1">--</h3>
                </div>
            </div>
        </div>

        <!-- USERS SECTION -->
        <div id="section-users" class="admin-section hidden">
            <h1 class="text-4xl font-display font-black text-slate-800 dark:text-white mb-2">User Management</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium italic mb-8">View and remove users from the platform</p>
            
            <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-900/50">
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Name</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Email</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Role</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-body" class="divide-y divide-slate-100 dark:divide-slate-700">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- DOCTORS SECTION -->
        <div id="section-doctors" class="admin-section hidden">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                <div>
                    <h1 class="text-4xl font-display font-black text-slate-800 dark:text-white mb-2">Doctor Management</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium italic">Create and manage clinical staff</p>
                </div>
                <button onclick="openDoctorModal()" class="flex items-center justify-center gap-3 px-8 py-4 bg-primary dark:bg-sky-600 text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all border-b-4 border-primary-dark dark:border-sky-700 active:border-b-0 active:translate-y-1">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i> Add Doctor
                </button>
            </div>
            <div id="doctor-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ANALYTICS SECTION -->
        <div id="section-analytics" class="admin-section hidden">
            <h1 class="text-4xl font-display font-black text-slate-800 dark:text-white mb-8">System Analytics</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <h3 class="text-xl font-display font-bold mb-6">User Distribution</h3>
                    <div class="w-full max-w-sm mx-auto aspect-square">
                        <canvas id="userRoleChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Add Doctor Modal -->
    <div id="doctor-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border-2 border-transparent dark:border-slate-700 animate-bounce-in">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-display font-black text-slate-800 dark:text-white">Add Doctor</h2>
                <button onclick="closeDoctorModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
                </button>
            </div>
            <form id="doctor-form" class="space-y-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Full Name</label>
                    <input type="text" id="doc-name" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl outline-none focus:border-primary">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Email</label>
                    <input type="email" id="doc-email" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl outline-none focus:border-primary">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Password</label>
                    <input type="password" id="doc-password" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl outline-none focus:border-primary">
                </div>
                <button type="submit" class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-lg border-b-4 border-primary-dark">Save Doctor</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
