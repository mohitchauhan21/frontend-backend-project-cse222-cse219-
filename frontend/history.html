<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adherence History - MedRemind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', secondary: '#10b981' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20 font-['Inter']">
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-display font-bold">History</h1>
            <p class="text-slate-500 font-medium">Track your medication adherence logs</p>
        </header>

        <div id="history-list" class="space-y-4 text-center py-12 text-slate-400">
            Loading history...
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 md:hidden z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Home</span>
        </a>
        <a href="medicines.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="pill" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Meds</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-primary">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">History</span>
        </a>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/history.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
